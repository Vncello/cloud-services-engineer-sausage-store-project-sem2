---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name:  postgresql
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      name: postgresql
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - name: postgresql
              containerPort: {{ .Values.postgresql.ports.containerPort }}
      volumeMounts:
        - name: postgresql-storage
          mountPath: {{ .Values.postgresql.volume.mountPath }}
      envFrom:
        - configMapRef:
            name: postgresql-conf
      volumeClaimTemplates:
        - metadata:
            name: postgresql-storage
          spec:
            accessModes:
              - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    app: postgresql
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.postgresql.ports.port }}
      targetPort: {{ .Values.postgresql.ports.containerPort }}
      protocol: TCP
  selector:
    app: postgresql

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-conf
  namespace: {{ .Release.Namespace }}
data:
{{ toYaml .Values.postgresql.data | nindent 2}}